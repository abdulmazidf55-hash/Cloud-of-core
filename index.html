<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Cloud of Core - International Dashboard</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0f0a 100%);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== ENHANCED NETWORK BACKGROUND ===== */
        #plexus-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 100, 0, 0.08) 0%, #0a0a0a 90%);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== LANDING PAGE ===== */
        #landing-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: transparent;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(2px);
        }
        #landing-page.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .landing-content {
            text-align: center;
            padding: 20px;
            width: 100%;
            position: relative;
            z-index: 1001;
        }

        .landing-logo {
            width: min(320px, 80%);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 40px rgba(255, 100, 0, 0.8));
            animation: premiumFloat 4s ease-in-out infinite;
        }

        @keyframes premiumFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .glow-btn {
            padding: 16px 48px;
            font-size: 1.4rem;
            font-weight: 700;
            border: none;
            background: linear-gradient(135deg, #ff6600, #ff3300);
            color: #fff;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 102, 0, 0.6);
            width: min(350px, 85%);
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        .glow-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(255, 102, 0, 0.8);
        }

        /* ===== UNIQUE SIGNIN POPUP ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.show {
            display: flex;
            animation: modalGlow 0.5s ease;
        }

        .modal-content {
            background: linear-gradient(165deg, #2a1a0f, #0a0a0a);
            padding: 40px 30px;
            border-radius: 50px;
            width: 100%;
            max-width: 400px;
            border: 2px solid rgba(255, 102, 0, 0.5);
            box-shadow: 0 30px 60px -15px rgba(255, 102, 0, 0.4);
            position: relative;
            animation: cardFloat 0.6s ease-out;
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 102, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 2px solid #ff6600;
            font-size: 2.5rem;
            color: #ff6600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px #ff6600; }
            50% { box-shadow: 0 0 40px #ff6600; }
        }

        .modal-content h2 {
            color: transparent;
            background: linear-gradient(135deg, #ff6600, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6600;
            font-size: 1.2rem;
        }

        .modal-content input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            border: 2px solid rgba(255, 102, 0, 0.3);
            border-radius: 40px;
            background: rgba(20, 20, 30, 0.7);
            color: white;
            font-size: 1rem;
        }

        .modal-content button {
            width: 100%;
            padding: 16px;
            margin: 15px 0 10px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #ff6600, #ff3300);
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .auth-links span {
            color: #ff6600;
            cursor: pointer;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6600;
            font-size: 1.5rem;
            cursor: pointer;
            border: 1px solid rgba(255,102,0,0.3);
        }

        /* ===== GORGEOUS ANIMATED TYPING POPUP ===== */
        .popup-welcome {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.3s, opacity 0.3s ease;
        }
        .popup-welcome.show {
            visibility: visible;
            opacity: 1;
        }
        .welcome-card {
            background: linear-gradient(145deg, #1f1a15, #0e0b08);
            border-radius: 48px;
            max-width: 500px;
            width: 90%;
            padding: 30px 25px 35px;
            border: 2px solid #ff884d;
            box-shadow: 0 0 80px rgba(255, 102, 0, 0.4);
            position: relative;
            transform: scale(0.9);
            animation: cardPop 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
            text-align: center;
        }
        @keyframes cardPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .close-welcome {
            position: absolute;
            top: 18px;
            right: 22px;
            width: 42px;
            height: 42px;
            background: rgba(255, 102, 0, 0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #ff884d;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 102, 0, 0.6);
        }
        .close-welcome:hover {
            background: #ff6600;
            color: #0a0a0a;
            transform: rotate(90deg);
        }
        .welcome-image {
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            border-radius: 32px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #ff884d;
        }
        .welcome-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffaa66, #ff6600);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 15px 0 10px;
            letter-spacing: -0.5px;
        }
        .typing-area {
            font-size: 1.2rem;
            color: #ffcc99;
            min-height: 80px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 32px;
            border-left: 5px solid #ff6600;
            text-align: left;
            font-weight: 500;
            line-height: 1.5;
        }
        .cursor-blink {
            display: inline-block;
            width: 3px;
            height: 1.2rem;
            background-color: #ff884d;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== MAIN APP ===== */
        #main-app {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .header {
            background: rgba(20, 15, 10, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid rgba(255, 102, 0, 0.5);
        }

        .header-logo {
            height: 42px;
            width: auto;
            filter: drop-shadow(0 0 15px #ff6600);
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid rgba(255, 102, 0, 0.5);
            border-radius: 40px;
            background: rgba(30, 25, 20, 0.7);
            color: white;
            font-size: 15px;
        }

        #search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #2a1f15;
            border-radius: 10px;
            margin-top: 5px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            border: 1px solid #ff6600;
            z-index: 1000;
        }

        .search-item {
            padding: 12px 15px;
            border-bottom: 1px solid #ff884d;
            color: #ff884d;
            cursor: pointer;
        }

        .logout-btn {
            background: transparent;
            border: 1.5px solid #ff6600;
            color: #ff6600;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff6600;
            color: #0a0a0a;
        }

        .main-content {
            flex: 1;
            padding: 25px 20px;
            position: relative;
            z-index: 20;
        }

        .main-logo {
            width: min(200px, 45%);
            display: block;
            margin: 0 auto 20px;
            filter: drop-shadow(0 0 30px #ff6600);
        }

        .student-count {
            font-size: 1.5rem;
            text-align: center;
            color: #ff884d;
            margin: 15px 0 25px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 20px 0 25px;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(40, 30, 20, 0.8), rgba(20, 15, 10, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 102, 0, 0.5);
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
        }

        .stat-batch {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ff884d;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: white;
        }

        .trend-up { color: #ffaa66; }
        .trend-down { color: #ff6644; }

        .stat-label {
            font-size: 0.8rem;
            color: #ff884d;
            margin-top: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Batch Leadership Section */
        .batch-leadership-section {
            margin: 30px 0 20px;
        }

        .leadership-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .leadership-header h3 {
            font-size: 1.6rem;
            font-weight: 800;
            color: transparent;
            background: linear-gradient(135deg, #ff884d, #ffaa66);
            -webkit-background-clip: text;
            background-clip: text;
            display: inline-block;
            padding-bottom: 5px;
        }

        .leadership-subtitle {
            color: #aaa;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .leadership-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .leadership-item {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, rgba(40, 30, 20, 0.8), rgba(20, 15, 10, 0.8));
            backdrop-filter: blur(5px);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 102, 0, 0.3);
        }

        .leadership-rank-number {
            width: 36px;
            font-size: 1.1rem;
            font-weight: 800;
            color: #ff884d;
        }

        .leadership-badge {
            width: 45px;
            font-size: 1.3rem;
            animation: badgeGlow 1.5s infinite;
        }

        .leadership-batch-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .leadership-points {
            font-size: 1rem;
            font-weight: 700;
            color: #ff884d;
        }

        .leadership-metric {
            font-size: 0.8rem;
            color: #aaa;
            margin-left: 8px;
        }

        .leadership-item.batch-305-highlight {
            background: linear-gradient(90deg, rgba(255, 102, 0, 0.3), rgba(255, 68, 0, 0.2));
            border: 2px solid #ff884d;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.3);
        }

        /* Mission Success Rank Section */
        .mission-section {
            margin: 30px 0 20px;
        }

        .mission-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .mission-header h3 {
            font-size: 1.6rem;
            font-weight: 800;
            color: transparent;
            background: linear-gradient(135deg, #ffaa44, #ff8844);
            -webkit-background-clip: text;
            background-clip: text;
            display: inline-block;
            padding-bottom: 5px;
        }

        .mission-subtitle {
            color: #aaa;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .mission-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mission-item {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, rgba(50, 35, 20, 0.8), rgba(30, 20, 10, 0.8));
            backdrop-filter: blur(5px);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 136, 0, 0.4);
        }

        .mission-rank-number {
            width: 36px;
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffaa44;
        }

        .mission-badge {
            width: 45px;
            font-size: 1.3rem;
            animation: missionGlow 2s infinite;
        }

        .mission-batch-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .mission-stats {
            display: flex;
            gap: 8px;
            margin-right: 10px;
        }

        .mission-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 45px;
        }

        .mission-stat-label {
            font-size: 0.65rem;
            color: #aaa;
        }

        .mission-stat-value {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .total-mission { color: #ffffff; }
        .success-mission { color: #ffaa66; }
        .failed-mission { color: #ff6644; }

        .mission-item.mission-highlight {
            background: linear-gradient(90deg, rgba(255, 102, 0, 0.25), rgba(255, 68, 0, 0.15));
            border: 2px solid #ffaa44;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.3);
        }

        @keyframes missionGlow {
            0%, 100% { filter: drop-shadow(0 0 5px #ffaa44); }
            50% { filter: drop-shadow(0 0 15px #ffaa44); }
        }

        @keyframes badgeGlow {
            0%, 100% { filter: drop-shadow(0 0 5px currentColor); }
            50% { filter: drop-shadow(0 0 15px currentColor); }
        }

        .batch-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
        }

        .batch-btn {
            padding: 14px 32px;
            border: 2px solid rgba(255, 102, 0, 0.7);
            background: rgba(40, 30, 20, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            transition: 0.2s;
            cursor: pointer;
        }

        .batch-btn.batch-305-btn {
            background: linear-gradient(145deg, #ff884d, #ff551a);
            border: 2px solid #ffaa66;
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.5);
        }

        .student-list-container {
            max-height: 380px;
            overflow-y: auto;
            background: rgba(20, 15, 10, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px 15px;
            margin: 15px 0 20px;
            border: 1px solid rgba(255, 102, 0, 0.5);
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .student-card {
            background: rgba(50, 40, 30, 0.8);
            padding: 12px 6px;
            border-radius: 16px;
            border: 1px solid rgba(255, 102, 0, 0.3);
            font-size: 0.85rem;
            text-align: center;
            color: #ff884d;
            font-weight: 500;
            cursor: pointer;
        }

        .ranking-section {
            margin: 30px 0 20px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff884d, #ffaa66);
            -webkit-background-clip: text;
            background-clip: text;
            text-align: center;
            margin-bottom: 18px;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, rgba(40, 30, 20, 0.8), rgba(20, 15, 10, 0.8));
            backdrop-filter: blur(5px);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 102, 0, 0.3);
        }

        .rank-number {
            width: 36px;
            font-size: 1.1rem;
            font-weight: 800;
            color: #ff884d;
        }

        .rank-badge {
            width: 45px;
            font-size: 1.3rem;
        }

        .rank-name {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .rank-points {
            font-size: 1rem;
            font-weight: 700;
            color: #ff884d;
        }

        .batch-305-ranking {
            margin: 20px 0;
            background: rgba(255, 102, 0, 0.15);
            border-radius: 20px;
            padding: 15px;
            border: 2px solid #ff884d;
        }

        .batch-305-title {
            color: #ff884d;
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .batch-305-leaderboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .batch-305-leader-item {
            display: flex;
            align-items: center;
            background: rgba(255, 102, 0, 0.15);
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #ff884d;
            cursor: pointer;
        }

        .notice-section {
            margin: 30px 0 20px;
            padding: 22px 18px;
            background: linear-gradient(145deg, rgba(40, 30, 20, 0.7), rgba(20, 15, 10, 0.8));
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(255, 102, 0, 0.5);
        }

        .notice-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff884d;
            text-align: center;
            margin-bottom: 12px;
        }

        .notice-content {
            font-size: 1.1rem;
            line-height: 1.6;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 18px;
            border-left: 4px solid #ff6600;
        }

        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .popup-overlay.show {
            display: flex;
        }

        .popup-card {
            background: linear-gradient(165deg, #2a1f15, #15100a);
            padding: 28px 22px;
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            border: 2px solid rgba(255, 102, 0, 0.7);
            position: relative;
        }

        .popup-close {
            position: absolute;
            top: 18px;
            right: 22px;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6600;
            font-size: 24px;
            cursor: pointer;
        }

        .footer {
            background: rgba(20, 15, 10, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px 20px 15px;
            border-top: 2px solid rgba(255, 102, 0, 0.5);
            margin-top: 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="plexus-canvas"></canvas>
    <div class="overlay"></div>

    <!-- LANDING PAGE -->
    <div id="landing-page">
        <div class="landing-content">
            <img src="https://i.postimg.cc/kX3Xh6PG/IMG-20260211-135705-716-removebg-preview.png" alt="Logo" class="landing-logo">
            <br>
            <button class="glow-btn" onclick="showAuthModal()">GO TO DASHBOARD</button>
        </div>
    </div>

    <!-- SIGNIN POPUP -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()">&times;</div>
            <div class="modal-icon"><i class="fas fa-user-astronaut"></i></div>
            <h2>WELCOME BACK</h2>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email Address"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Password"></div>
            <button id="auth-action-btn" onclick="handleAuth()">SIGN IN</button>
            <div class="auth-links"><span onclick="toggleAuthMode()">Create Account</span><span>Forgot Password?</span></div>
        </div>
    </div>

    <!-- TYPING WELCOME POPUP (GORGEOUS) -->
    <div id="welcomePopup" class="popup-welcome">
        <div class="welcome-card">
            <div class="close-welcome" onclick="closeWelcomePopup()">&times;</div>
            <img id="popupImage" class="welcome-image" src="" alt="Welcome Visual">
            <div id="popupTitle" class="welcome-title"></div>
            <div id="typingMessage" class="typing-area"></div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app">
        <div class="header">
            <img src="https://i.postimg.cc/kX3Xh6PG/IMG-20260211-135705-716-removebg-preview.png" alt="Logo" class="header-logo">
            <div class="search-container"><input type="text" id="search-input" placeholder="Search students..." oninput="searchStudents(this.value)"><div id="search-results"></div></div>
            <button class="logout-btn" onclick="logout()">EXIT</button>
        </div>
        <div class="main-content">
            <img src="https://i.postimg.cc/kX3Xh6PG/IMG-20260211-135705-716-removebg-preview.png" alt="Logo" class="main-logo">
            <div class="student-count" id="total-students-display">📊 2026 · 1,852 Students</div>
            <div class="stats-container" id="batch-stats"></div>
            <div class="batch-leadership-section"><div class="leadership-header"><h3>💎 BEST PERFORMANCE BATCH</h3><div class="leadership-subtitle">Top Performing Batches</div></div><div class="leadership-list" id="leadership-list"></div></div>
            <div class="mission-section"><div class="mission-header"><h3>🎯 MISSION SUCCESS RANK</h3><div class="mission-subtitle">Batch Mission Statistics</div></div><div class="mission-list" id="mission-list"></div></div>
            <div class="batch-buttons">
                <button class="batch-btn" onclick="showBatchStudents('301')">BATCH 301</button>
                <button class="batch-btn" onclick="showBatchStudents('302')">BATCH 302</button>
                <button class="batch-btn" onclick="showBatchStudents('303')">BATCH 303</button>
                <button class="batch-btn" onclick="showBatchStudents('304')">BATCH 304</button>
                <button class="batch-btn batch-305-btn" onclick="showBatchStudents('305')">BATCH 305 · 4</button>
            </div>
            <div id="student-list-container" class="student-list-container" style="display: none;"><h3 style="color:#ff884d;" id="batch-title"></h3><div id="student-grid" class="student-grid"></div></div>
            <div id="batch-305-ranking-container" class="batch-305-ranking" style="display: none;"><div class="batch-305-title"><i class="fas fa-crown"></i> BATCH 305 LEADERBOARD <i class="fas fa-crown"></i></div><div class="batch-305-leaderboard" id="batch-305-leaderboard"></div></div>
            <div class="ranking-section"><h2 class="section-title">🏆 TOP 10 LEADERBOARD</h2><div class="ranking-list" id="ranking-list"></div></div>
            <div class="notice-section"><h2 class="notice-title">🔥 LIVE UPDATE 🔥</h2><div class="notice-content" id="notice-content"></div></div>
        </div>
        <footer class="footer"><p>CLOUD OF CORE © 2026 · International Edition</p></footer>
    </div>

    <div id="popup" class="popup-overlay"><div class="popup-card"><span class="popup-close" onclick="closePopup()">&times;</span><div id="popup-content"></div></div></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDDBbyxLcZYbSqSa12cSwK3yGxRU_NvLg8", authDomain: "coccore-f5f6d.firebaseapp.com", projectId: "coccore-f5f6d", storageBucket: "coccore-f5f6d.firebasestorage.app", messagingSenderId: "830480343011", appId: "1:830480343011:web:038a91e8d619d6d2e28ad6", measurementId: "G-ET9W850HEN" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        let allStudentsData = {}, isSignUp = false, welcomeClosedSession = false;

        function initPlexus() { /* canvas background (same as original) */
            const canvas = document.getElementById('plexus-canvas'), ctx = canvas.getContext('2d'); let w, h, particles = [];
            function resize() { w = innerWidth; h = innerHeight; canvas.width = w; canvas.height = h; }
            function create() { particles = Array.from({length: 70}, () => ({x: Math.random()*w, y: Math.random()*h, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, size: Math.random()*2+0.8, color: `rgba(255,${100+Math.random()*100},${50+Math.random()*50},0.6)`})); }
            function draw() { ctx.clearRect(0,0,w,h); for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){ let dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.hypot(dx,dy); if(d<150){ ctx.beginPath(); ctx.strokeStyle=`rgba(255,102,0,${0.15*(1-d/150)})`; ctx.lineWidth=0.7; ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke(); } } particles.forEach(p=>{ ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1; }); requestAnimationFrame(draw); }
            resize(); create(); draw(); addEventListener('resize',()=>{resize(); create();});
        } initPlexus();

        function showAuthModal() { document.getElementById('auth-modal').classList.add('show'); }
        function closeModal() { document.getElementById('auth-modal').classList.remove('show'); }
        function toggleAuthMode() { isSignUp = !isSignUp; document.getElementById('auth-action-btn').innerText = isSignUp ? 'SIGN UP' : 'SIGN IN'; }
        function handleAuth() { const email=document.getElementById('email').value, pwd=document.getElementById('password').value; if(isSignUp) auth.createUserWithEmailAndPassword(email,pwd).then(()=>afterAuth()).catch(e=>alert(e.message)); else auth.signInWithEmailAndPassword(email,pwd).then(()=>afterAuth()).catch(e=>alert(e.message)); }
        function afterAuth() { closeModal(); document.getElementById('landing-page').classList.add('hidden'); document.getElementById('main-app').style.display = 'flex'; loadData(); loadRealTimeData(); if(!welcomeClosedSession) showWelcomePopup(); }
        function logout() { auth.signOut(); welcomeClosedSession=false; }
        auth.onAuthStateChanged(user=>{ if(user){ document.getElementById('landing-page').classList.add('hidden'); document.getElementById('main-app').style.display='flex'; loadData(); loadRealTimeData(); if(!welcomeClosedSession) showWelcomePopup(); } else { document.getElementById('landing-page').classList.remove('hidden'); document.getElementById('main-app').style.display='none'; } });

        async function showWelcomePopup() {
            const popupDiv = document.getElementById('welcomePopup');
            const img = document.getElementById('popupImage');
            const titleSpan = document.getElementById('popupTitle');
            const msgDiv = document.getElementById('typingMessage');
            const doc = await db.collection('welcomePopup').doc('config').get();
            let imageUrl = "https://i.postimg.cc/kX3Xh6PG/IMG-20260211-135705-716-removebg-preview.png";
            let titleText = "WELCOME TO CLOUD OF CORE";
            let messageText = "🌟 Experience the future of learning. Stay tuned for daily missions and exclusive rewards!";
            if(doc.exists){
                const d=doc.data();
                if(d.imageUrl) imageUrl = d.imageUrl;
                if(d.title) titleText = d.title;
                if(d.message) messageText = d.message;
            }
            img.src = imageUrl;
            titleSpan.innerText = titleText;
            msgDiv.innerHTML = '';
            popupDiv.classList.add('show');
            let i = 0;
            function typeWriter() {
                if(i < messageText.length) { msgDiv.innerHTML += messageText.charAt(i); i++; setTimeout(typeWriter, 40); }
                else { msgDiv.innerHTML += '<span class="cursor-blink"></span>'; }
            }
            typeWriter();
        }
        function closeWelcomePopup() {
            const popupDiv = document.getElementById('welcomePopup');
            popupDiv.classList.remove('show');
            welcomeClosedSession = true;
        }
        function loadData() { db.collection('students').onSnapshot(s=>{ allStudentsData={}; s.forEach(d=>allStudentsData[d.id]=d.data()); if(document.getElementById('batch-305-ranking-container')?.style.display==='block') updateBatch305Leaderboard(); }); }
        function loadRealTimeData() { db.collection('batchStats').onSnapshot(s=>{ let html=''; s.forEach(d=>{ let data=d.data(); html+=`<div class="stat-card"><div class="stat-batch">BATCH ${data.batch}</div><div class="stat-value">${data.value}<span class="trend-${data.trend}"><i class="fas fa-arrow-${data.trend}"></i></span></div><div class="stat-label">TOTAL POINTS</div></div>`; }); document.getElementById('batch-stats').innerHTML=html||generateDefaultStats(); }); db.collection('batchLeadership').orderBy('rank').onSnapshot(s=>{ let html=''; s.forEach(d=>{ let data=d.data(), is305=data.batch==='305', badge=''; if(data.rank===1) badge='<i class="fas fa-gem"></i>'; else if(data.rank===2) badge='<i class="fas fa-crown"></i>'; else if(data.rank===3) badge='<i class="fas fa-medal"></i>'; else if(data.rank===4) badge='<i class="fas fa-award"></i>'; else badge='<i class="fas fa-star"></i>'; html+=`<div class="leadership-item ${is305?'batch-305-highlight':''}"><span class="leadership-rank-number">#${data.rank}</span><div class="leadership-badge">${badge}</div><span class="leadership-batch-name">BATCH ${data.batch}</span><span class="leadership-points">${data.value}</span></div>`; }); document.getElementById('leadership-list').innerHTML=html; }); db.collection('missionRank').orderBy('rank').onSnapshot(s=>{ let html=''; s.forEach(d=>{ let data=d.data(); let badge=''; if(data.rank===1) badge='<i class="fas fa-trophy"></i>'; else if(data.rank===2) badge='<i class="fas fa-medal"></i>'; else if(data.rank===3) badge='<i class="fas fa-award"></i>'; else badge='<i class="fas fa-chevron-circle-up"></i>'; html+=`<div class="mission-item ${data.highlighted?'mission-highlight':''}"><span class="mission-rank-number">#${data.rank}</span><div class="mission-badge">${badge}</div><span class="mission-batch-name">BATCH ${data.batch}</span><div class="mission-stats"><div class="mission-stat"><span class="mission-stat-label">Total</span><span class="mission-stat-value">${data.totalMissions||0}</span></div><div class="mission-stat"><span class="mission-stat-label">✓</span><span class="mission-stat-value success-mission">${data.successMissions||0}</span></div><div class="mission-stat"><span class="mission-stat-label">✗</span><span class="mission-stat-value failed-mission">${data.failedMissions||0}</span></div></div></div>`; }); document.getElementById('mission-list').innerHTML=html||generateDefaultMissionRank(); }); db.collection('ranking').orderBy('points','desc').limit(10).onSnapshot(s=>{ let html='',i=1; s.forEach(d=>{ let data=d.data(); let badge=i===1?'<i class="fas fa-crown"></i>':i===2?'<i class="fas fa-medal"></i>':i===3?'<i class="fas fa-medal"></i>':'<i class="fas fa-star"></i>'; html+=`<div class="rank-item"><span class="rank-number">#${i}</span><div class="rank-badge">${badge}</div><span class="rank-name">${data.name}</span><span class="rank-points">${data.points}</span></div>`; i++; }); document.getElementById('ranking-list').innerHTML=html||generateDefaultRanking(); }); db.collection('notices').doc('latest').onSnapshot(d=>{ if(d.exists) document.getElementById('notice-content').innerHTML=d.data().content; }); db.collection('settings').doc('general').onSnapshot(d=>{ if(d.exists) document.getElementById('total-students-display').innerHTML=`📊 2026 · ${d.data().totalStudents}`; }); }
        function generateDefaultStats(){ return `<div class="stat-card"><div class="stat-batch">BATCH 301</div><div class="stat-value">12.4K<span class="trend-up"><i class="fas fa-arrow-up"></i></span></div></div><div class="stat-card"><div class="stat-batch">BATCH 302</div><div class="stat-value">9.8K<span class="trend-down"><i class="fas fa-arrow-down"></i></span></div></div><div class="stat-card"><div class="stat-batch">BATCH 303</div><div class="stat-value">15.6K<span class="trend-up"><i class="fas fa-arrow-up"></i></span></div></div><div class="stat-card"><div class="stat-batch">BATCH 304</div><div class="stat-value">7.5K<span class="trend-down"><i class="fas fa-arrow-down"></i></span></div></div><div class="stat-card"><div class="stat-batch">BATCH 305</div><div class="stat-value">21.0K<span class="trend-up"><i class="fas fa-arrow-up"></i></span></div></div>`; }
        function generateDefaultRanking(){ return Array.from({length:10},(_,i)=>`<div class="rank-item"><span class="rank-number">#${i+1}</span><div class="rank-badge"><i class="fas fa-star"></i></div><span class="rank-name">Top Student ${i+1}</span><span class="rank-points">${2000-i*100}</span></div>`).join(''); }
        function generateDefaultMissionRank(){ let arr=[{batch:'305',rank:1,total:24,success:22,failed:2,highlighted:true},{batch:'303',rank:2,total:32,success:28,failed:4},{batch:'301',rank:3,total:45,success:38,failed:7},{batch:'302',rank:4,total:28,success:22,failed:6},{batch:'304',rank:5,total:36,success:27,failed:9}]; return arr.map(d=>`<div class="mission-item ${d.highlighted?'mission-highlight':''}"><span class="mission-rank-number">#${d.rank}</span><div class="mission-badge"><i class="fas fa-trophy"></i></div><span class="mission-batch-name">BATCH ${d.batch}</span><div class="mission-stats"><div class="mission-stat"><span>Total</span><span>${d.total}</span></div><div class="mission-stat"><span>✓</span><span>${d.success}</span></div><div class="mission-stat"><span>✗</span><span>${d.failed}</span></div></div></div>`).join(''); }
        const batchStudents={'301':Array.from({length:888},(_,i)=>`Student ${i+1}`),'302':Array.from({length:292},(_,i)=>`Learner ${i+1}`),'303':Array.from({length:278},(_,i)=>`Scholar ${i+1}`),'304':Array.from({length:318},(_,i)=>`Pioneer ${i+1}`),'305':['majedul islam fahad','sayid hossain sayem','abu talha shamim','kamrul hassan sojib']};
        function showBatchStudents(batch){ let container=document.getElementById('student-list-container'), grid=document.getElementById('student-grid'), rank305=document.getElementById('batch-305-ranking-container'); if(batch==='305'){ container.style.display='none'; rank305.style.display='block'; updateBatch305Leaderboard(); } else { rank305.style.display='none'; document.getElementById('batch-title').innerHTML=`📚 BATCH ${batch} · ${batchStudents[batch].length} STUDENTS`; grid.innerHTML=batchStudents[batch].map(name=>`<div class="student-card" onclick="handleStudentClick('${batch}','${name.replace(/'/g,"\\'")}')">${name}</div>`).join(''); container.style.display='block'; } }
        function handleStudentClick(batch,name){ if(batch==='305') showStudentPopup(name); else { document.getElementById('popup-content').innerHTML=`<div style="text-align:center;padding:20px;"><i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#ff6644;"></i><h2>ACCESS DENIED</h2><p>You are not a student of Batch ${batch}</p></div>`; document.getElementById('popup').classList.add('show'); } }
        function showStudentPopup(name){ let data=allStudentsData[name]||{classPoints:0,totalPoints:0,examMarks:0,totalMarks:0,notice:'No data'}; document.getElementById('popup-content').innerHTML=`<div style="font-size:1.6rem;font-weight:800;color:#ff884d;margin-bottom:10px;text-transform:capitalize;">${name}</div><div class="student-detail"><div class="detail-row"><span>Class Points:</span><span>${data.classPoints}</span></div><div class="detail-row"><span>Total Points:</span><span>${data.totalPoints}</span></div><div class="detail-row"><span>Exam Marks:</span><span>${data.examMarks}</span></div><div class="detail-row"><span>Total Marks:</span><span>${data.totalMarks}</span></div></div><div class="student-notice"><i class="fas fa-bell"></i> ${data.notice}</div>`; document.getElementById('popup').classList.add('show'); }
        function updateBatch305Leaderboard(){ let students=['majedul islam fahad','sayid hossain sayem','abu talha shamim','kamrul hassan sojib'].map(name=>({name,data:allStudentsData[name]||{totalPoints:0}})).sort((a,b)=>b.data.totalPoints-a.data.totalPoints); let html=''; students.forEach((s,i)=>{ let rankIcon=i===0?'<i class="fas fa-crown"></i>':i===1?'<i class="fas fa-medal"></i>':i===2?'<i class="fas fa-medal"></i>':''; html+=`<div class="batch-305-leader-item ${i===0?'rank-1':''}" onclick="showStudentPopup('${s.name}')"><span class="batch-305-rank">#${i+1}</span><span class="batch-305-name">${rankIcon} ${s.name}</span><span class="batch-305-points">${s.data.totalPoints} pts</span></div>`; }); document.getElementById('batch-305-leaderboard').innerHTML=html; }
        function closePopup(){ document.getElementById('popup').classList.remove('show'); }
        let searchTimeout; function searchStudents(q){ clearTimeout(searchTimeout); searchTimeout=setTimeout(()=>{ let resultsDiv=document.getElementById('search-results'); if(!q){ resultsDiv.style.display='none'; return; } let found=[]; Object.entries(batchStudents).forEach(([batch,list])=>list.forEach(name=>{ if(name.toLowerCase().includes(q.toLowerCase())) found.push({name,batch}); })); if(found.length){ resultsDiv.innerHTML=found.slice(0,5).map(f=>`<div class="search-item" onclick="handleStudentClick('${f.batch}','${f.name.replace(/'/g,"\\'")}')">${f.name} · Batch ${f.batch}</div>`).join(''); resultsDiv.style.display='block'; } else { resultsDiv.innerHTML='<div class="search-item">❌ No results</div>'; resultsDiv.style.display='block'; } },200); }
        document.addEventListener('click',e=>{ if(!e.target.closest('.search-container')) document.getElementById('search-results').style.display='none'; });
    </script>
</body>
</html>
